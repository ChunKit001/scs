#配置参考 https://www.guardsquare.com/manual/configuration/usage
# Proguard配置项：指定不进行代码缩小优化
-dontshrink

# 指定不进行字节码级别的优化
-dontoptimize

# 混淆时不生成大小写混合的类名
-dontusemixedcaseclassnames

# 混淆时使用唯一类成员命名策略
-useuniqueclassmembernames

# 同上，再次指定不生成大小写混合的类名
-dontusemixedcaseclassnames

# 混淆类名后，对使用Class.forName('className')等进行相应替代
-adaptclassstrings

# 保留异常、内部类、签名、弃用注解、源文件、行号表、注解、封装方法等信息
-keepattributes Exceptions,InnerClasses,Signature,Deprecated,SourceFile,LineNumberTable,*Annotation*,EnclosingMethod

# 保留所有接口的原始名称不进行混淆
-keepnames interface ** { *; }

# 保留所有包中原始接口文件不进行混淆
-keep interface * extends * { *; }

# 保留方法参数名
-keepparameternames

# 保留枚举成员及方法
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# 保留 Spring Boot 注解类
-keepclassmembers class * {
    @org.springframework.beans.factory.annotation.Autowired *;
    @org.springframework.beans.factory.annotation.Value *;
    @jakarta.annotation.Resource *;
    @org.springframework.context.annotation.Bean *;
    @org.springframework.stereotype.Service *;
    @org.springframework.stereotype.Component *;
    @org.springframework.stereotype.Controller *;
    @org.springframework.stereotype.Repository *;
}

# 保留序列化类
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    !static !transient <fields>;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

# 忽略warn消息
-ignorewarnings

# 忽略note消息
-dontnote

# 打印配置信息
-printconfiguration

# 避免重复类定义问题
-dontwarn sun.misc.**
-dontwarn java.**
-dontwarn javax.**
-dontwarn jdk.**
-dontwarn com.oracle.**

# 不处理系统类
-keep class java.** { *; }
-keep class javax.** { *; }
-keep class sun.** { *; }
-keep class jdk.** { *; }
-keep class com.oracle.** { *; }

# 保持启动类不被混淆
-keep public class com.scs.start.Application {
public static void main(java.lang.String[]);
}